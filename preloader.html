<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-container": "#929090",
                        "on-primary": "#1a1c1c",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab",
                        "background": "#000000",
                        "on-tertiary-container": "#000000",
                        "on-secondary-fixed": "#1a1c1c",
                        "surface-container-lowest": "#0e0e0e",
                        "on-secondary": "#1a1c1c",
                        "tertiary": "#e4e2e1",
                        "outline-variant": "#474747",
                        "surface-container-highest": "#353535",
                        "primary": "#ffffff",
                        "surface-tint": "#c6c6c7",
                        "primary-container": "#d4d4d4",
                        "error-container": "#93000a",
                        "on-secondary-container": "#e3e2e2",
                        "tertiary-fixed-dim": "#474747",
                        "surface-container-low": "#1b1b1b",
                        "secondary-container": "#464747",
                        "on-tertiary-fixed": "#ffffff",
                        "surface-variant": "#353535",
                        "surface-bright": "#393939",
                        "outline": "#919191",
                        "on-tertiary-fixed-variant": "#e4e2e1",
                        "on-tertiary": "#1b1c1c",
                        "surface-container-high": "#2a2a2a",
                        "on-secondary-fixed-variant": "#3a3c3c",
                        "primary-fixed": "#5d5f5f",
                        "on-surface": "#e2e2e2",
                        "primary-fixed-dim": "#454747",
                        "on-primary-container": "#000000",
                        "on-background": "#e2e2e2",
                        "surface-dim": "#131313",
                        "surface": "#131313",
                        "on-error": "#690005",
                        "on-surface-variant": "#c6c6c6",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "on-primary-fixed": "#ffffff",
                        "surface-container": "#1f1f1f",
                        "inverse-primary": "#5d5f5f",
                        "inverse-surface": "#e2e2e2",
                        "secondary": "#c7c6c6",
                        "secondary-fixed-dim": "#ababab",
                        "secondary-fixed": "#c7c6c6",
                        "inverse-on-surface": "#303030",
                        "tertiary-fixed": "#5f5e5e"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }

        .progress-bar-fill {
            width: 0;
            animation: loadProgress 3s linear forwards;
        }

        @keyframes loadProgress {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        .portrait-shell {
            position: relative;
            width: 12rem;
            height: 12rem;
        }

        @media (min-width: 768px) {
            .portrait-shell {
                width: 16rem;
                height: 16rem;
            }
        }

        .portrait-image {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0.9;
            z-index: 2;
        }

        .face-eyes {
            position: absolute;
            top: 37%;
            left: 50%;
            display: flex;
            gap: 1.6rem;
            transform: translateX(-50%);
            z-index: 1;
            opacity: 0.9;
        }

        .eye {
            width: 1.1rem;
            height: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.65);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.08);
        }

        .eye::after {
            content: "";
            width: 0.32rem;
            height: 0.32rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.4);
            animation: eyeFocus 3s ease-in-out infinite;
        }

        @keyframes eyeFocus {
            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-1px);
            }

            75% {
                transform: translateX(1px);
            }
        }

        .loader-dots {
            display: flex;
            justify-content: center;
            gap: 0.45rem;
            margin-top: 1.2rem;
        }

        .loader-dot {
            width: 0.45rem;
            height: 0.45rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.28);
            animation: loaderPulse 0.8s ease-in-out infinite;
        }

        .loader-dot:nth-child(2) {
            animation-delay: 0.15s;
        }

        .loader-dot:nth-child(3) {
            animation-delay: 0.3s;
        }

        @keyframes loaderPulse {
            0%,
            100% {
                transform: translateY(0) scale(1);
                background: rgba(255, 255, 255, 0.28);
            }

            50% {
                transform: translateY(-4px) scale(1.2);
                background: rgba(255, 255, 255, 0.9);
            }
        }
    </style>
</head>

<body class="font-body text-on-surface">
    <!-- Preloader Canvas -->
    <main class="flex flex-col items-center justify-center min-h-screen w-full bg-black">
        <!-- Center Content Wrapper -->
        <div class="flex flex-col items-center space-y-12">
            <!-- Illustration Container -->
            <div class="relative group">
                <!-- Subtle glow background behind image -->
                <div class="absolute inset-0 bg-primary/5 blur-3xl rounded-full"></div>
                <div class="portrait-shell">
                    <div aria-hidden="true" class="face-eyes">
                        <span class="eye"></span>
                        <span class="eye"></span>
                    </div>
                    <img class="portrait-image"
                        data-alt="Minimalist hand-drawn black and white line art illustration of a person's head from behind a laptop with light rays emanating from the screen."
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuDhb95f1-9_2R7nfZNacKsl_4yvfzVljrzYEotmR4I0kNLXuzA_oCN5twJr3gpqy2c_bfdPHs7u9Cx_u740lgT7a0qE5qYe4FbvdEnKZUl9F9YHwVYFTDMahoLk0lbhpZLbc2rEkfIfbbAqdo1AHQwER3jI74zg3c0jNdpSO0UmgGARTI0tipNBCCcoXNhow0VmLwSQdO72Q6CP9OvbSjLRfnGu-JLRjA9jmiDX5BP00kzCBYrBYALTSafzimJMhgrGmm_E-a3dUEu7" />
                </div>
            </div>
            <!-- Loading Interface -->
            <div class="flex flex-col items-center w-64 md:w-80">
                <!-- Terminal Text -->
                <div class="w-full flex items-center justify-start mb-6 font-mono">
                    <span class="text-on-surface-variant text-xs tracking-widest lowercase opacity-80">
                        [system]: booting curator_core
                    </span>
                    <span class="ml-1 w-1.5 h-3.5 bg-primary cursor-blink"></span>
                </div>
                <!-- Progress Bar Track -->
                <div class="w-full h-[1px] bg-surface-container-highest relative overflow-hidden">
                    <!-- Progress Bar Fill -->
                    <div class="progress-bar-fill absolute h-full bg-primary/40"></div>
                </div>
                <!-- Metadata/Status Footer -->
                <div class="w-full flex justify-between mt-3">
                    <span class="text-[10px] font-label text-outline tracking-widest uppercase opacity-40">
                        ver 2.0.4_stable
                    </span>
                    <span class="text-[10px] font-label text-outline tracking-widest uppercase opacity-40" id="loader-percentage">
                        0%
                    </span>
                </div>
                <div class="loader-dots" aria-label="Loading animation">
                    <span class="loader-dot"></span>
                    <span class="loader-dot"></span>
                    <span class="loader-dot"></span>
                </div>
            </div>
        </div>
        <!-- Ambient Branding -->
        <div class="fixed bottom-12 left-0 w-full flex justify-center">
            <div class="flex items-center space-x-3 opacity-20">
                <span class="material-symbols-outlined text-sm" data-icon="terminal">terminal</span>
                <span class="text-xs font-label tracking-[0.3em] lowercase">terminal_curator</span>
            </div>
        </div>
    </main>
    <!-- Contextual "Blink" Status (Top Right) -->
    <div class="fixed top-8 right-8 flex items-center space-x-2">
        <div class="w-1.5 h-1.5 rounded-full bg-primary shadow-[0_0_8px_rgba(255,255,255,0.5)]"></div>
        <span
            class="text-[10px] font-label text-on-surface-variant tracking-widest lowercase opacity-60">est_connection</span>
    </div>
    <script>
        const percentageNode = document.getElementById("loader-percentage");
        const startTime = performance.now();
        const duration = 3000;

        function updateLoader(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            percentageNode.textContent = `${Math.round(progress * 100)}%`;

            if (progress < 1) {
                requestAnimationFrame(updateLoader);
            }
        }

        requestAnimationFrame(updateLoader);
    </script>
</body>

</html>
